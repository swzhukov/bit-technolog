# Nginx vhost для БИТ.Технолог
# Положить в /etc/nginx/sites-enabled/bit-technolog.conf
# Проверить: nginx -t && systemctl reload nginx

# HTTP → редирект на HTTPS (если есть сертификат)
# Без сертификата — закомментировать server { listen 443; ... } и оставить только :80

upstream bit_technolog_backend {
    server 127.0.0.1:8081;
    keepalive 32;
}

# HTTP (временный, без домена — listen на конкретном server_name)
server {
    listen 80;
    server_name bit.beget.tech _;   # _ = default, или указать IP-адрес VPS

    # Для Let's Encrypt challenge (когда получим домен)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Максимальный размер загрузки чертежей (50 МБ) + импорт ТК (100 МБ)
    client_max_body_size 100M;
    client_body_timeout 120s;

    # Проксируем на uvicorn
    location / {
        proxy_pass http://bit_technolog_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}

